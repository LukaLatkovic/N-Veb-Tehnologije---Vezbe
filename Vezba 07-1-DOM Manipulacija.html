<!DOCTYPE html>
<html lang="sr">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="author" content="Luka Latkovic">
    <title>DOM manipulacija</title>

    <style>
        body {
            font-family: Arial, sans-serif;
            text-align: center;
            margin-top: 80px;
            background-color: #f1f5f9;
        }

        #tekst {
            font-size: 24px;
            margin-bottom: 20px;
            color: #1e293b;
            transition: 0.3s;
        }

        button {
            padding: 12px 20px;
            font-size: 16px;
            border: none;
            border-radius: 8px;
            background-color: #2563eb;
            color: white;
            cursor: pointer;
            transition: 0.3s;
        }

        button:hover {
            background-color: #1d4ed8;
        }
    </style>
</head>

<body>

    <h1>DOM manipulacija</h1>

    <p id="tekst">Klikni dugme da promenis tekst i stil</p>

    <button id="dugme">Klikni me</button>

    <script>
        const tekst = document.getElementById("tekst");
        const dugme = document.getElementById("dugme");

        dugme.addEventListener("click", () => {

            tekst.textContent = "Tekst je promenjen!";

            tekst.style.color = "red";
            tekst.style.fontSize = "30px";
            tekst.style.fontWeight = "bold";

        });
    </script>

</body>

</html>
