<!DOCTYPE html>
<html lang="sr">

<head>
    <meta charset="UTF-8">
    <title>Boje i pristupačnost</title>

    <style>
        :root {
            --primary-color: #3498db;
            --secondary-color: #2ecc71;
            --accent-color: rgb(231, 76, 60);
            --background-color: #f9f9f9;
            --text-color: #222;
        }

        body {
            margin: 0;
            font-family: Arial, sans-serif;
            background: var(--background-color);
            color: var(--text-color);
        }

        header {
            background: var(--primary-color);
            color: white;
            padding: 20px;
            text-align: center;
        }

        main {
            padding: 40px;
            max-width: 800px;
            margin: auto;
        }

        a {
            color: var(--primary-color);
            text-decoration: none;
            font-weight: bold;
        }

        a:hover {
            color: hsl(207, 70%, 40%);
            text-decoration: underline;
        }

        button {
            background: var(--secondary-color);
            border: none;
            color: white;
            padding: 12px 20px;
            font-size: 16px;
            cursor: pointer;
            border-radius: 5px;
            transition: background 0.2s;
        }

        button:hover {
            background: var(--accent-color);
        }

        footer {
            background: #eee;
            text-align: center;
            padding: 20px;
        }
    </style>

</head>

<body>

    <header>
        <h1>Primer boja i pristupačnosti</h1>
    </header>

    <main>

        <p>
            Ovo je primer stranice sa prilagođenom paletom boja i dobrim kontrastom
            za čitljivost teksta.
        </p>

        <p>
            Posetite
            <a href="#">ovaj link</a>
            da vidite kako funkcioniše hover efekat.
        </p>

        <button>Klikni me</button>

    </main>

    <footer>
        <p>Footer sadržaj</p>
    </footer>

</body>

</html>
