<!DOCTYPE html>
<html lang="sr">

<head>
    <meta charset="UTF-8">
    <title>Navigacija</title>

    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 0;
        }

        nav {
            background: #333;
            padding: 10px;
        }

        ul {
            list-style: none;
            display: flex;
            gap: 20px;
            margin: 0;
            padding: 0;
        }

        a {
            color: white;
            text-decoration: none;
            font-weight: bold;
        }

        a:hover {
            text-decoration: underline;
        }

        a[aria-current="page"] {
            border-bottom: 2px solid #fff;
        }
    </style>

</head>

<body>

    <nav aria-label="Glavna navigacija">
        <ul>
            <li><a href="#" aria-current="page">Početna</a></li>
            <li><a href="#">O nama</a></li>
            <li><a href="#">Kontakt</a></li>
        </ul>
    </nav>

</body>

</html>
