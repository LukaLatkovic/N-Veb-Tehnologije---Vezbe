<!DOCTYPE html>
<html lang="sr">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="author" content="Luka Latkovic">
    <title>Domaci 12-4 - Try/Catch</title>

    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #f1f5f9;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
        }

        .container {
            background: white;
            padding: 30px;
            border-radius: 14px;
            box-shadow: 0 4px 14px rgba(0, 0, 0, 0.1);
            text-align: center;
            width: 400px;
        }

        h1 {
            margin-bottom: 20px;
        }

        button {
            padding: 12px 20px;
            border: none;
            border-radius: 8px;
            background-color: #2563eb;
            color: white;
            cursor: pointer;
            font-size: 16px;
        }

        button:hover {
            background-color: #1d4ed8;
        }

        #status {
            margin-top: 20px;
            padding: 12px;
            border-radius: 10px;
            font-weight: bold;
            display: none;
        }

        .uspeh {
            background-color: #dcfce7;
            color: #166534;
            border: 1px solid #86efac;
        }

        .greska {
            background-color: #fee2e2;
            color: #991b1b;
            border: 1px solid #fca5a5;
        }
    </style>
</head>

<body>

    <div class="container">
        <h1>Test API zahteva</h1>
        <button id="dugme">Posalji zahtev</button>
        <p id="status"></p>
    </div>

    <script>
        const dugme = document.getElementById("dugme");
        const status = document.getElementById("status");

        dugme.addEventListener("click", async () => {
            status.style.display = "block";
            status.textContent = "Slanje zahteva...";
            status.className = "";

            try {
                const response = await fetch("https://jsonplaceholder.typicode.com/invalid-url");

                if (!response.ok) {
                    throw new Error(
                        "Status: " + response.status + " - " + response.statusText
                    );
                }

                const data = await response.json();

                status.textContent = "Uspeh! Podaci su ucitani.";
                status.className = "uspeh";

                console.log(data);

            } catch (error) {
                status.textContent = "Greska: " + error.message;
                status.className = "greska";
            }
        });
    </script>

</body>

</html>
