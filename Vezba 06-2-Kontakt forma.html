<!DOCTYPE html>
<html lang="sr">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="author" content="Luka Latković">
    <title>Kontakt forma</title>

    <style>
        body {
            font-family: Arial, sans-serif;
            background: #f4f6f8;
            margin: 0;
            padding: 40px;
        }

        .container {
            max-width: 700px;
            margin: 0 auto;
            background: #fff;
            padding: 30px;
            border-radius: 12px;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.1);
        }

        h1 {
            text-align: center;
            margin-bottom: 25px;
            color: #333;
        }

        .form-group {
            margin-bottom: 18px;
        }

        label {
            display: block;
            margin-bottom: 6px;
            font-weight: bold;
            color: #333;
        }

        input,
        textarea,
        select {
            width: 100%;
            padding: 10px;
            border: 1px solid #ccc;
            border-radius: 6px;
            font-size: 14px;
            box-sizing: border-box;
        }

        textarea {
            resize: vertical;
            min-height: 120px;
        }

        input:focus,
        textarea:focus,
        select:focus {
            outline: none;
            border-color: #3498db;
            box-shadow: 0 0 5px rgba(52, 152, 219, 0.4);
        }

        .buttons {
            display: flex;
            gap: 15px;
            justify-content: center;
            margin-top: 20px;
        }

        button {
            padding: 12px 24px;
            border: none;
            border-radius: 6px;
            font-size: 15px;
            cursor: pointer;
            transition: 0.3s;
        }

        button[type="submit"] {
            background: #3498db;
            color: white;
        }

        button[type="submit"]:hover {
            background: #2980b9;
        }

        button[type="reset"] {
            background: #e0e0e0;
            color: #333;
        }

        button[type="reset"]:hover {
            background: #cfcfcf;
        }
    </style>
</head>

<body>

    <div class="container">

        <h1>Kontaktirajte nas</h1>

        <form action="#" method="post">

            <div class="form-group">
                <label for="ime">Ime</label>
                <input type="text" id="ime" name="ime" placeholder="Unesite vaše ime" required>
            </div>

            <div class="form-group">
                <label for="email">E-pošta</label>
                <input type="email" id="email" name="email" placeholder="npr. email@gmail.com" required>
            </div>

            <div class="form-group">
                <label for="telefon">Broj telefona</label>
                <input type="tel" id="telefon" name="telefon" placeholder="+381 60 123 4567">
            </div>

            <div class="form-group">
                <label for="datum">Datum za poziv</label>
                <input type="date" id="datum" name="datum">
            </div>

            <div class="form-group">
                <label for="kontakt">Način kontakta</label>
                <select id="kontakt" name="kontakt">
                    <option value="">-- Izaberite --</option>
                    <option value="email">E-pošta</option>
                    <option value="telefon">Telefon</option>
                    <option value="video">Video poziv</option>
                </select>
            </div>

            <div class="form-group">
                <label for="poruka">Poruka</label>
                <textarea id="poruka" name="poruka" placeholder="Unesite vašu poruku..."></textarea>
            </div>

            <div class="buttons">
                <button type="submit">Submit</button>
                <button type="reset">Reset</button>
            </div>

        </form>

    </div>

</body>

</html>
