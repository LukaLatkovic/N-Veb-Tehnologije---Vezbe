<!DOCTYPE html>
<html lang="sr">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Responsive layout</title>

    <style>
        body {
            margin: 0;
            font-family: Arial, sans-serif;
        }

        nav {
            background: #333;
        }

        nav ul {
            list-style: none;
            margin: 0;
            padding: 10px;
            display: flex;
            gap: 20px;
        }

        nav a {
            color: white;
            text-decoration: none;
        }

        .container {
            display: flex;
            padding: 20px;
            gap: 20px;
        }

        main {
            flex: 1;
            background: #f4f4f4;
            padding: 20px;
        }

        aside {
            width: 250px;
            background: #ddd;
            padding: 20px;
        }

        @media (max-width: 768px) {

            nav ul {
                flex-direction: column;
            }

            .container {
                flex-direction: column;
            }

            aside {
                width: 100%;
            }
        }
    </style>
</head>

<body>

    <nav>
        <ul>
            <li><a href="#">Početna</a></li>
            <li><a href="#">O nama</a></li>
            <li><a href="#">Kontakt</a></li>
        </ul>
    </nav>

    <div class="container">

        <main>
            <h2>Glavni sadržaj</h2>
            <p>Ovo je glavni deo stranice.</p>
        </main>

        <aside>
            <h3>Bočna traka</h3>
            <p>Dodatne informacije.</p>
        </aside>

    </div>

</body>

</html>
