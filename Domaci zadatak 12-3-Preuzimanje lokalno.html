<!DOCTYPE html>
<html lang="sr">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="author" content="Luka Latkovic">
    <title>Domaci 12-3 - Preuzimanje lokalno</title>

    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #f1f5f9;
            margin: 0;
            padding: 40px 20px;
            color: #1e293b;
        }

        .container {
            max-width: 1000px;
            margin: 0 auto;
        }

        h1 {
            text-align: center;
            margin-bottom: 10px;
        }

        .opis {
            text-align: center;
            color: #475569;
            margin-bottom: 30px;
        }

        #status {
            text-align: center;
            font-weight: bold;
            margin-bottom: 25px;
            min-height: 24px;
        }

        .greska {
            color: #b91c1c;
        }

        .uspeh {
            color: #166534;
        }

        #listaProizvoda {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(240px, 1fr));
            gap: 20px;
        }

        .kartica {
            background-color: white;
            border-radius: 14px;
            padding: 20px;
            box-shadow: 0 4px 14px rgba(0, 0, 0, 0.08);
        }

        .kartica h2 {
            margin-top: 0;
            margin-bottom: 10px;
            font-size: 22px;
        }

        .cena {
            font-weight: bold;
            color: #2563eb;
            margin-bottom: 10px;
        }

        .opis-proizvoda {
            color: #475569;
            line-height: 1.5;
        }
    </style>
</head>

<body>

    <div class="container">
        <h1>Lista proizvoda iz lokalnog JSON fajla</h1>
        <p class="opis">Podaci se ucitavaju iz datoteke proizvodi.json i prikazuju u DOM-u.</p>

        <p id="status">Ucitavanje podataka...</p>
        <div id="listaProizvoda"></div>
    </div>

    <script>
        const status = document.getElementById("status");
        const listaProizvoda = document.getElementById("listaProizvoda");

        fetch("proizvodi.json")
            .then((res) => {
                if (!res.ok) {
                    throw new Error("Datoteka nije dostupna. Status: " + res.status);
                }

                return res.json();
            })
            .then((proizvodi) => {
                status.textContent = "Podaci su uspesno ucitani.";
                status.className = "uspeh";

                proizvodi.forEach((proizvod) => {
                    const kartica = document.createElement("div");
                    kartica.classList.add("kartica");

                    kartica.innerHTML = `
                        <h2>${proizvod.naziv}</h2>
                        <p class="cena">Cena: ${proizvod.cena}</p>
                        <p class="opis-proizvoda">${proizvod.opis}</p>
                    `;

                    listaProizvoda.appendChild(kartica);
                });
            })
            .catch((error) => {
                status.textContent = "Greska: " + error.message;
                status.className = "greska";
            });
    </script>

</body>

</html>
