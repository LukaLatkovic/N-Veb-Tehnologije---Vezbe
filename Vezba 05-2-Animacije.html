<!DOCTYPE html>
<html lang="sr">

<head>
    <meta charset="UTF-8">
    <title>Animacije</title>

    <style>
        body {
            font-family: Arial, sans-serif;
            text-align: center;
            padding: 50px;
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(-20px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        h1 {
            animation: fadeIn 2s ease-in-out;
        }

        button {
            margin-top: 30px;
            padding: 12px 25px;
            font-size: 16px;
            border: none;
            background: #3498db;
            color: white;
            border-radius: 5px;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        button:hover {
            background: #2980b9;
            transform: scale(1.1);
        }
    </style>
</head>

<body>

    <h1>Dobrodošli na stranicu</h1>

    <button>Klikni me</button>

</body>

</html>
