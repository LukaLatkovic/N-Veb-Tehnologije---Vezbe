<!DOCTYPE html>
<html lang="sr">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="author" content="Luka Latkovic">
    <title>Domaci 10-4 - Slanje podataka</title>

    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #f1f5f9;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
        }

        .container {
            width: 100%;
            max-width: 450px;
            background-color: white;
            padding: 30px;
            border-radius: 14px;
            box-shadow: 0 4px 14px rgba(0, 0, 0, 0.1);
        }

        h1 {
            text-align: center;
            margin-bottom: 20px;
        }

        form {
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        input,
        textarea {
            padding: 12px;
            border-radius: 8px;
            border: 1px solid #cbd5e1;
            font-size: 16px;
        }

        textarea {
            resize: none;
            height: 100px;
        }

        button {
            padding: 12px;
            border: none;
            border-radius: 8px;
            background-color: #2563eb;
            color: white;
            font-size: 16px;
            cursor: pointer;
        }

        button:hover {
            background-color: #1d4ed8;
        }

        #status {
            margin-top: 15px;
            text-align: center;
            font-weight: bold;
            min-height: 20px;
        }

        .uspeh {
            color: #166534;
        }

        .greska {
            color: #b91c1c;
        }
    </style>
</head>

<body>

    <div class="container">
        <h1>Kontakt forma</h1>

        <form id="forma">
            <input type="text" id="ime" placeholder="Ime" required>
            <input type="email" id="email" placeholder="E-posta" required>
            <textarea id="poruka" placeholder="Vasa poruka" required></textarea>

            <button type="submit">Posalji</button>
        </form>

        <p id="status"></p>
    </div>

    <script>
        const forma = document.getElementById("forma");
        const status = document.getElementById("status");

        forma.addEventListener("submit", (e) => {
            e.preventDefault();

            const ime = document.getElementById("ime").value.trim();
            const email = document.getElementById("email").value.trim();
            const poruka = document.getElementById("poruka").value.trim();

            status.textContent = "Slanje podataka...";
            status.className = "";

            const podaci = {
                ime: ime,
                email: email,
                poruka: poruka
            };

            fetch("https://jsonplaceholder.typicode.com/posts", {
                method: "POST",
                headers: {
                    "Content-Type": "application/json"
                },
                body: JSON.stringify(podaci)
            })
                .then((response) => {
                    if (!response.ok) {
                        throw new Error("Greska pri slanju podataka.");
                    }

                    return response.json();
                })
                .then((data) => {
                    status.textContent = "Uspeh! Podaci su poslati.";
                    status.className = "uspeh";

                    console.log("Odgovor servera:", data);

                    forma.reset();
                })
                .catch((error) => {
                    status.textContent = "Doslo je do greske: " + error.message;
                    status.className = "greska";
                });
        });
    </script>

</body>

</html>
