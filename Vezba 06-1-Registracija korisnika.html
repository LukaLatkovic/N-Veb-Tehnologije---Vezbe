<!DOCTYPE html>
<html lang="sr">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="author" content="Luka Latković">
    <title>Registracija korisnika</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background: #f4f6f8;
            margin: 0;
            padding: 40px;
        }

        .form-container {
            max-width: 700px;
            margin: 0 auto;
            background: #fff;
            padding: 30px;
            border-radius: 12px;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.1);
        }

        h1 {
            text-align: center;
            margin-bottom: 25px;
            color: #333;
        }

        fieldset {
            border: 1px solid #ddd;
            border-radius: 8px;
            padding: 20px;
            margin-bottom: 20px;
        }

        legend {
            font-weight: bold;
            color: #444;
            padding: 0 10px;
        }

        .form-group {
            margin-bottom: 15px;
        }

        label {
            display: block;
            margin-bottom: 6px;
            font-weight: bold;
            color: #333;
        }

        input[type="text"],
        input[type="password"],
        input[type="email"],
        input[type="date"],
        input[type="color"] {
            width: 100%;
            padding: 10px;
            border: 1px solid #ccc;
            border-radius: 6px;
            font-size: 14px;
            box-sizing: border-box;
        }

        .radio-group {
            display: flex;
            gap: 20px;
            margin-top: 8px;
        }

        .radio-group label {
            font-weight: normal;
            display: flex;
            align-items: center;
            gap: 6px;
        }

        .buttons {
            display: flex;
            gap: 15px;
            justify-content: center;
            margin-top: 20px;
        }

        button {
            padding: 12px 24px;
            border: none;
            border-radius: 6px;
            font-size: 15px;
            cursor: pointer;
            transition: 0.3s;
        }

        button[type="submit"] {
            background: #3498db;
            color: white;
        }

        button[type="submit"]:hover {
            background: #2980b9;
        }

        button[type="reset"] {
            background: #e0e0e0;
            color: #333;
        }

        button[type="reset"]:hover {
            background: #cfcfcf;
        }
    </style>
</head>

<body>

    <div class="form-container">
        <h1>Registracija novog korisnika</h1>

        <form action="#" method="post">

            <fieldset>
                <legend>Lični podaci</legend>

                <div class="form-group">
                    <label for="ime">Ime</label>
                    <input type="text" id="ime" name="ime" required>
                </div>

                <div class="form-group">
                    <label for="prezime">Prezime</label>
                    <input type="text" id="prezime" name="prezime" required>
                </div>

                <div class="form-group">
                    <label for="datum-rodjenja">Datum rođenja</label>
                    <input type="date" id="datum-rodjenja" name="datum-rodjenja">
                </div>

                <div class="form-group">
                    <label>Pol</label>
                    <div class="radio-group">
                        <label><input type="radio" name="pol" value="muski"> Muški</label>
                        <label><input type="radio" name="pol" value="zenski"> Ženski</label>
                    </div>
                </div>

                <div class="form-group">
                    <label for="boja">Omiljena boja</label>
                    <input type="color" id="boja" name="boja">
                </div>
            </fieldset>

            <fieldset>
                <legend>Podaci o nalogu</legend>

                <div class="form-group">
                    <label for="korisnicko-ime">Korisničko ime</label>
                    <input type="text" id="korisnicko-ime" name="korisnicko_ime" required>
                </div>

                <div class="form-group">
                    <label for="lozinka">Lozinka</label>
                    <input type="password" id="lozinka" name="lozinka" required>
                </div>

                <div class="form-group">
                    <label for="email">E-pošta</label>
                    <input type="email" id="email" name="email" required>
                </div>
            </fieldset>

            <div class="buttons">
                <button type="submit">Submit</button>
                <button type="reset">Reset</button>
            </div>

        </form>
    </div>

</body>

</html>
