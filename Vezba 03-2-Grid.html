<!DOCTYPE html>
<html lang="sr">

<head>
    <meta charset="UTF-8">
    <title>Grid Layout Primer</title>

    <style>
        body {
            margin: 0;
            font-family: Arial, sans-serif;
        }

        .container {
            display: grid;

            grid-template-columns: 1fr 250px;

            grid-template-rows: 80px 50px 1fr 60px;

            grid-template-areas:
                "header header"
                "nav nav"
                "main aside"
                "footer footer";

            min-height: 100vh;
        }

        header {
            grid-area: header;
            background: #3498db;
            color: white;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        nav {
            grid-area: nav;
            background: #2ecc71;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        main {
            grid-area: main;
            background: #f4f4f4;
            padding: 20px;
        }

        aside {
            grid-area: aside;
            background: #e67e22;
            padding: 20px;
            color: white;
        }

        footer {
            grid-area: footer;
            background: #34495e;
            color: white;
            display: flex;
            align-items: center;
            justify-content: center;
        }
    </style>

</head>

<body>

    <div class="container">

        <header>
            <h2>Header</h2>
        </header>

        <nav>
            Navigacija
        </nav>

        <main>
            <h3>Glavni sadržaj</h3>
            <p>Ovo je glavni deo stranice koji zauzima većinu prostora.</p>
        </main>

        <aside>
            <h3>Aside</h3>
            <p>Dodatni sadržaj ili reklame.</p>
        </aside>

        <footer>
            Footer
        </footer>

    </div>

</body>

</html>
