<!DOCTYPE html>
<html lang="sr">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="author" content="Luka Latkovic">
    <meta name="description" content="Anketni obrazac napravljen u HTML-u i CSS-u">
    <title>Anketni obrazac</title>

    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: Arial, sans-serif;
        }

        body {
            background: linear-gradient(135deg, #dbeafe, #eff6ff);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 30px;
        }

        .container {
            width: 100%;
            max-width: 650px;
            background-color: #ffffff;
            padding: 30px;
            border-radius: 18px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.12);
        }

        h1 {
            text-align: center;
            margin-bottom: 10px;
            color: #1e3a8a;
        }

        p {
            text-align: center;
            margin-bottom: 25px;
            color: #475569;
        }

        form {
            display: flex;
            flex-direction: column;
            gap: 18px;
        }

        .form-group {
            display: flex;
            flex-direction: column;
        }

        label {
            margin-bottom: 8px;
            font-weight: bold;
            color: #1f2937;
        }

        input,
        select,
        textarea {
            padding: 12px;
            border: 1px solid #cbd5e1;
            border-radius: 10px;
            font-size: 15px;
            transition: 0.3s;
        }

        input:focus,
        select:focus,
        textarea:focus {
            border-color: #2563eb;
            outline: none;
            box-shadow: 0 0 0 4px rgba(37, 99, 235, 0.15);
        }

        .checkbox-group {
            display: flex;
            flex-direction: column;
            gap: 8px;
            padding: 12px;
            background-color: #f8fafc;
            border-radius: 10px;
            border: 1px solid #e2e8f0;
        }

        .checkbox-group label {
            font-weight: normal;
            margin-bottom: 0;
        }

        .range-value {
            text-align: right;
            font-size: 14px;
            color: #334155;
            margin-top: 5px;
        }

        .buttons {
            display: flex;
            gap: 12px;
            justify-content: center;
            margin-top: 10px;
        }

        button {
            padding: 12px 22px;
            border: none;
            border-radius: 10px;
            font-size: 15px;
            cursor: pointer;
            transition: 0.3s;
        }

        .submit-btn {
            background-color: #2563eb;
            color: white;
        }

        .submit-btn:hover {
            background-color: #1d4ed8;
        }

        .reset-btn {
            background-color: #e2e8f0;
            color: #1f2937;
        }

        .reset-btn:hover {
            background-color: #cbd5e1;
        }

        @media (max-width: 600px) {
            .container {
                padding: 22px;
            }

            .buttons {
                flex-direction: column;
            }

            button {
                width: 100%;
            }
        }
    </style>
</head>

<body>

    <div class="container">
        <h1>Anketni obrazac</h1>
        <p>Popunite obrazac i recite nam vase misljenje.</p>

        <form action="#" method="post">
            <div class="form-group">
                <label for="ime">Ime:</label>
                <input type="text" id="ime" name="ime" placeholder="Unesite vase ime" required>
            </div>

            <div class="form-group">
                <label for="email">E-posta:</label>
                <input type="email" id="email" name="email" placeholder="Unesite vasu e-postu" required>
            </div>

            <div class="form-group">
                <label for="starosna-grupa">Starosna grupa:</label>
                <select id="starosna-grupa" name="starosna-grupa" required>
                    <option value="">-- Izaberite starosnu grupu --</option>
                    <option value="do18">Do 18 godina</option>
                    <option value="18-25">18 - 25 godina</option>
                    <option value="26-35">26 - 35 godina</option>
                    <option value="36-50">36 - 50 godina</option>
                    <option value="50plus">Preko 50 godina</option>
                </select>
            </div>

            <div class="form-group">
                <label for="datum">Datum ucesca:</label>
                <input type="date" id="datum" name="datum" required>
            </div>

            <div class="form-group">
                <label for="zadovoljstvo">Skala zadovoljstva:</label>
                <input type="range" id="zadovoljstvo" name="zadovoljstvo" min="1" max="10" value="5"
                    oninput="vrednost.innerText = this.value">
                <div class="range-value">Vrednost: <span id="vrednost">5</span></div>
            </div>

            <div class="form-group">
                <label>Sta vam se najvise dopalo?</label>
                <div class="checkbox-group">
                    <label><input type="checkbox" name="dopalo" value="dizajn"> Dizajn sajta</label>
                    <label><input type="checkbox" name="dopalo" value="jednostavnost"> Jednostavnost koriscenja</label>
                    <label><input type="checkbox" name="dopalo" value="sadrzaj"> Sadrzaj</label>
                    <label><input type="checkbox" name="dopalo" value="brzina"> Brzina rada</label>
                </div>
            </div>

            <div class="buttons">
                <button type="submit" class="submit-btn">Submit</button>
                <button type="reset" class="reset-btn">Reset</button>
            </div>
        </form>
    </div>

</body>

</html>
